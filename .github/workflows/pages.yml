name: Deploy wedding invitation to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "davetiye/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare public invitation
        env:
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("davetiye/index.html")
          html = path.read_text(encoding="utf-8")

          repo_name = os.environ["REPOSITORY"].split("/", 1)[1]
          owner = os.environ["REPOSITORY_OWNER"]
          pages_url = f"https://{owner}.github.io/{repo_name}/"

          html = re.sub(
              r'<meta property="og:url" content="[^"]*" />',
              f'<meta property="og:url" content="{pages_url}" />',
              html
          )

          html = html.replace(
              '''      <section class="section" aria-labelledby="familyTitle">\n        <p class="section-kicker">Aileleri</p>\n        <h2 class="section-heading reveal" id="familyTitle">Sevdiklerimizle</h2>\n\n        <div class="family-grid">''',
              '''      <section class="section" aria-label="Aileler">\n        <div class="family-grid">'''
          )

          html = html.replace('            <p class="family-side">Nevra\'nın ailesi</p>\n', '')
          html = html.replace('            <p class="family-side">Enes\'in ailesi</p>\n', '')

          path.write_text(html, encoding="utf-8")
          Path("davetiye/.nojekyll").touch()
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload invitation
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./davetiye

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
